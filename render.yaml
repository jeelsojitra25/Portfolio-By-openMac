services:
  # ── Portfolio Frontend (Static Site) ───────────────────────────────
  - type: web
    name: jeel-portfolio-client
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://jeel-portfolio-api.onrender.com

  # ── Portfolio Backend (Web Service) ────────────────────────────────
  - type: web
    name: jeel-portfolio-api
    runtime: node
    buildCommand: cd server && npm install
    startCommand: node server/server.js
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: jeel-portfolio-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://jeelsojitra.tech,https://www.jeelsojitra.tech
      - key: JWT_PRIVATE_KEY
        sync: false   # set manually in Render dashboard
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: IP_SALT
        generateValue: true

databases:
  - name: jeel-portfolio-db
    plan: free
    databaseName: portfolio
    user: portfolio
